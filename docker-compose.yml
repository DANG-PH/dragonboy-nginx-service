version: '3.8'
services:
  redis:
    image: redis
    container_name: ${REDIS_CONTAINER}
    ports:
      - '127.0.0.1:6379:6379'

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redisinsight
    ports:
      - '127.0.0.1:5540:5540'
    environment:
      - RI_APP_USERNAME=${REDIS_INSIGHT_USERNAME}
      - RI_APP_PASSWORD=${REDIS_INSIGHT_PASSWORD}
    depends_on:
      - redis

  nats:
    image: nats:latest
    container_name: nats
    ports:
      - '4222:4222'
    restart: unless-stopped
    
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq
    ports:
      - '127.0.0.1:5674:5672'
      - '127.0.0.1:15674:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}

  mysql-nro:
    image: mysql:8.0
    container_name: ${MYSQL_CONTAINER}
    ports:
      - '127.0.0.1:3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASS}
    volumes:
      - ./configAdmin.sql:/docker-entrypoint-initdb.d/configAdmin.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - '127.0.0.1:8081:80'
    environment:
      PMA_HOST: ${MYSQL_CONTAINER}
      PMA_ABSOLUTE_URI: https://data.ngocrongdark.com/
    depends_on:
      - mysql-nro

  # adminer:
  #   image: adminer
  #   container_name: adminer
  #   ports:
  #     - '2809:8080'
  #   depends_on:
  #     - mysql-nro

  jaeger:
    image: jaegertracing/jaeger:2.11.0
    container_name: jaeger
    ports:
      - '127.0.0.1:16686:16686'
      - '127.0.0.1:16685:16685'
      - '127.0.0.1:4317:4317'
      - '127.0.0.1:4318:4318'
      - '127.0.0.1:6831:6831/udp'
      - '127.0.0.1:6832:6832/udp'
      - '127.0.0.1:14268:14268'
      - '127.0.0.1:14250:14250'
      - '127.0.0.1:27777:27777'
      - '127.0.0.1:27778:27778'

  mongo:
    image: mongo
    container_name: ${MONGO_CONTAINER}
    restart: always
    ports:
      - '127.0.0.1:27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASS}

  mongo-express:
    image: mongo-express
    container_name: mongo-express
    restart: always
    ports:
      - '127.0.0.1:8082:8081'
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASS}
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_MONGODB_SERVER: ${MONGO_CONTAINER}
      ME_CONFIG_BASICAUTH_USERNAME: ${ME_BASICAUTH_USER}
      ME_CONFIG_BASICAUTH_PASSWORD: ${ME_BASICAUTH_PASS}
    depends_on:
      - mongo
  postgres:
    image: postgres:15
    container_name: ${POSTGRES_CONTAINER}
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
      POSTGRES_DB: ${PG_DB}
    ports:
      - '127.0.0.1:5432:5432'

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS}
    ports:
      - '127.0.0.1:5050:80'
    depends_on:
      - postgres

  nginx:
    image: nginx:latest
    container_name: nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./htpasswd:/etc/nginx/.htpasswd:ro
    network_mode: "host"
    restart: always

  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: cloudflared
  #   command: tunnel --no-autoupdate --url http://172.17.0.1:3000
  #   network_mode: bridge
  #   dns:
  #     - 1.1.1.1
  #     - 8.8.8.8
  #   restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - '127.0.0.1:9090:9090'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS}
      GF_SERVER_ROOT_URL: https://grafana.ngocrongdark.com/
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - '127.0.0.1:3001:3000'
    depends_on:
      - prometheus



