user nginx;
worker_processes auto;

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
}

http {
    tcp_nodelay on;   
    tcp_nopush  off;  # tắt gom packet

    client_max_body_size 50M;

    map $http_upgrade $connection_header {
        default "";        # HTTP thường → keepalive
        "websocket" "upgrade";  # WebSocket → upgrade
    }

    upstream api_gateway {
        least_conn;
        server 103.116.52.222:3000 max_fails=3 fail_timeout=30s;
        server 103.116.52.219:3000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream pay_service {
        least_conn;
        server 103.116.52.222:3005 max_fails=3 fail_timeout=30s;
        server 103.116.52.219:3005 max_fails=3 fail_timeout=30s;
    }

    upstream game_service {
        least_conn;
        server 103.116.52.222:3009 max_fails=3 fail_timeout=30s;
        server 103.116.52.219:3009 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream game_service_go {
        least_conn;
        server 103.116.52.222:3010 max_fails=3 fail_timeout=30s;
        server 103.116.52.219:3010 max_fails=3 fail_timeout=30s;
        keepalive 64;
        keepalive_requests 10000;
    }

    # API
    server {
        listen 80;
        server_name api.ngocrongdark.com api.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name api.ngocrongdark.com api.dangpham.id.vn;
        # nginx vừa check domain hợp lệ bằng server_name, vừa đưa cert xem domain đó có nằm trong cert k( tức là server này đúng là domain đó )
        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        # khóa root
        location = / {
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        }

        # khóa swagger
        location /api-docs {
            # allow 123.123.123.123;  # IP văn phòng/team, có thể thêm sau ( tailscale, wireguard, ... )
            # deny all;       
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
        }

        # còn lại bình thường
        location / {
            proxy_pass http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_header;
        }
    }

    # PAY
    server {
        listen 80;
        server_name pay.ngocrongdark.com pay.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name pay.ngocrongdark.com pay.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location / {
            proxy_pass http://pay_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # DATA
    server {
        listen 80;
        server_name data.ngocrongdark.com data.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name data.ngocrongdark.com data.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://127.0.0.1:8081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_header;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }
    }

    # REDIS
    server {
        listen 80;
        server_name redis.ngocrongdark.com redis.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name redis.ngocrongdark.com redis.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;
        auth_basic "Bạn cần có quyền";
        auth_basic_user_file /etc/nginx/.htpasswd;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        location / {
            proxy_pass http://127.0.0.1:5540;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_header;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }
    }

    # POSTGRES
    server {
        listen 80;
        server_name postgres.ngocrongdark.com postgres.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name postgres.ngocrongdark.com postgres.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        
        location / {
            proxy_pass http://127.0.0.1:5050;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_header;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }
    }

    # DOWNLOAD GAME
    server {
        listen 80;
        server_name download.ngocrongdark.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name download.ngocrongdark.com;

        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;

        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location / {
            return 302 https://github.com/DANG-PH/NgocRongOnline/releases;
        }
    }

    # WEBSOCKET
    server {
        listen 80;
        server_name ws.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name ws.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location / {
            proxy_pass http://game_service;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            # WebSocket
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_header;
            # Giữ connection lâu
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }
    }

    # WEBSOCKET GO
    server {
        listen 80;
        server_name ws-go.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name ws-go.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        location / {
            proxy_pass http://game_service_go;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_header;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
        }
    }

    # GRAFANA
    server {
        listen 80;
        server_name grafana.ngocrongdark.com;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name grafana.ngocrongdark.com;
        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location / {
            proxy_pass http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_header;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # PROFILE (DỰ ÁN KHÁC NHƯNG CHUNG NGINX DO CÙNG VPS)
    server {
        listen 80;
        server_name profile-api.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name profile-api.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

        location / {
            proxy_pass http://127.0.0.1:8888;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_header;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }

    # DỰ ÁN THỨ 3 NHƯNG CHUNG VPS

    # DEMO-DATA
    server {
        listen 80;
        server_name demo-data.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name demo-data.dangpham.id.vn;
        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;

        location / {
            proxy_pass http://127.0.0.1:9081;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_header;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header Cookie $http_cookie;
            proxy_set_header Origin $http_origin;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_read_timeout 300;
            proxy_connect_timeout 300;
            proxy_send_timeout 300;
        }
    }

    # DEMO-API
    server {
        listen 80;
        server_name demo-api.dangpham.id.vn;
        return 301 https://$host$request_uri;
    }
    server {
        listen 443 ssl;
        server_name demo-api.dangpham.id.vn;
        # nginx vừa check domain hợp lệ bằng server_name, vừa đưa cert xem domain đó có nằm trong cert k( tức là server này đúng là domain đó )
        ssl_certificate /etc/letsencrypt/live/api.ngocrongdark.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.ngocrongdark.com/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;

        # khóa swagger
        location /api-docs {
            # allow 123.123.123.123;  # IP văn phòng/team, có thể thêm sau ( tailscale, wireguard, ... )
            # deny all;       
            auth_basic "Restricted";
            auth_basic_user_file /etc/nginx/.htpasswd;
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
            proxy_set_header X-Forwarded-Proto https;
        }

        # còn lại bình thường
        location / {
            proxy_pass http://127.0.0.1:4000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
