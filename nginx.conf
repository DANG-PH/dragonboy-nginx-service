}

stream {
    server {
        listen 33306;
        proxy_pass 127.0.0.1:3306;
    }
    server {
        listen 36379;
        proxy_pass 127.0.0.1:6379;
    }
    server {
        listen 35432;
        proxy_pass 127.0.0.1:5432;
    }
    server {
        listen 35674;
        proxy_pass 127.0.0.1:5674;
    }
    server {
        listen 37017;
        proxy_pass 127.0.0.1:27017;
    }
}
